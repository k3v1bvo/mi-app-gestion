<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Grupo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 id="formTitle">Nuevo Grupo</h1>
        <form id="groupForm">
            <div class="mb-3">
                <label>Nombre del Grupo *</label>
                <input type="text" id="group_name" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/groups" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
    <script>
        const groupId = window.location.pathname.split('/').pop();
        if (groupId !== 'new') {
            document.getElementById('formTitle').innerText = 'Editar Grupo';
            fetch(`/api/groups/${groupId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('group_name').value = data.group_name;
                });
        }

        document.getElementById('groupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { group_name: document.getElementById('group_name').value };
            const method = groupId !== 'new' ? 'PUT' : 'POST';
            const url = groupId !== 'new' ? `/api/groups/${groupId}` : '/api/groups';
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                window.location.href = '/groups';
            } else {
                const error = await res.json();
                alert('Error: ' + error.error);
            }
        });
    </script>
</body>
</html>
