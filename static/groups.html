<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Grupos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Grupos</h1>
        <a href="/group/new" class="btn btn-primary mb-3">Agregar Grupo</a>
        <a href="/" class="btn btn-secondary mb-3">Volver a Personas</a>
        <table class="table table-striped" id="groupsTable">
            <thead><tr><th>Nombre</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        async function loadGroups() {
            const res = await fetch('/api/groups');
            const groups = await res.json();
            const tbody = document.querySelector('#groupsTable tbody');
            tbody.innerHTML = '';
            groups.forEach(g => {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = g.group_name;
                row.insertCell(1).innerHTML = `
                    <a href="/group/edit/${g.code}" class="btn btn-sm btn-warning">Editar</a>
                    <button class="btn btn-sm btn-danger" onclick="deleteGroup('${g.code}')">Eliminar</button>
                `;
            });
        }
        async function deleteGroup(code) {
            if (confirm('Eliminar grupo? Se perderán las personas asociadas?')) {
                await fetch(`/api/groups/${code}`, { method: 'DELETE' });
                loadGroups();
            }
        }
        loadGroups();
    </script>
</body>
</html>
